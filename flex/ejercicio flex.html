<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Flex</title>
</head>
<!--si no hay flex wrap con wrap no hay eje secundario y no se puede usar align items ok-->
 <style>
        body{
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: space-between;
            align-content: space-around;
            height: 100vh;
        }

        div{ /* PRIMER DIV */
            width: 300px;
            height: 200px;
            border: 1px black solid;
            display: flex;
            justify-content: space-between;
        }

        span:nth-child(odd){
            background-color: rgb(156, 42, 42);
            width: 70px;
            height: 50px;
        }

        span:nth-child(even){
            background-color: royalblue;
             width: 70px;
            height: 50px;
        }

        div:nth-of-type(2){ /* SEGUNDO DIV */
            display: flex;
            justify-content: space-between;
            align-content: center;
            flex-wrap: wrap;
        }

        div:nth-of-type(3){ /* TERCER DIV */
            display: flex;
            justify-content: space-between;
            align-content: end;
            flex-wrap: wrap;
        }
        
        div:nth-of-type(4){ /* CUARTO DIV */
            flex-wrap: wrap;
            justify-content: space-between;
            align-content: space-between;
        }

        div:nth-of-type(5){ /* QUINTO DIV */
            flex-wrap: nowrap;
            justify-content: space-between;
            align-content: space-between;
        }

        div:nth-of-type(5) span{ /* Le quitamos el tamaño al span*/
            flex-wrap: wrap;
            height: initial;
        }

        div:nth-of-type(6){ /* SEXTO DIV */
            flex-wrap: nowrap;
            align-items: center;
        }

        div:nth-of-type(7){ /* SEPTIMO DIV */
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

         div:nth-of-type(8){ /* OPTAVO DIV */
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: center;
            align-content: space-between;
        }

        

    </style>
</head>
<body>
    <div>
        <span>1</span><span></span><span></span>
    </div>

    <div>
        <span>2</span><span></span><span></span>
    </div>

    <div>
        <span>3</span><span></span><span></span>
    </div>

    <div>
        <span>4</span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div>
        <span>5</span><span></span><span></span>
    </div>

    <div>
        <span>6</span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div>
        <span>7</span><span></span><span></span>
    </div>
    <div>
        <span>8</span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
</body>
</html>
