<style>
    /*
    OR es ,
    
    El only es para que dispositivos que no soporten las mediaqueris que importen el css y
     ya en navegadores antiguos, es paea evitar que carguen todo elcodigo de las mediqqueris*/
    @import url("estilo1234.css") only screen and(max-width: 1024px); /*Sirve para importar*/

    @media screen and(max-width:600px), screen and (orientation: portrait){
        p{
            color: yellow;
        }
    }

    p{
        font-size: 20px;
        font-weight: bold; /*Lo que queremos que se aplique siempre no va en las media queries*/
    }

    @media screen and (max-width:1000px) and (min-width:601px){
    p{
        color: blue;
    }
    span{
        font-style: italic;
    }
}
@media screen and (max-width:600px) { /*Si la pantalla tiene un tamaño máximo de X, aplicamos....*/
    p{
        color: red;
    }
    span{
        text-decoration: underline;
    }
}

@media screen and NOT (max-width:1024px){ /*Negar una condicion*/

}


</style>
<body>

   <picture>
    <source srcset="imagen/pequeña.png" media="(min-width:10px) and (max-width:649px)">

    <source srcset="imagen/mediana.png" media="(min-width:650px) and (max-width:1000px)">

    <img src="imagen/grande.png" alt="imagen por defecto" width="100%">
</picture>
