<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/*EL ORDEN IMPORTA*/

/*MAZWIDTH MINWIDHT MAXIMO X O MINIMO X*/

/* Tablet */
@media screen and (max-width:3024px){
    ol{
        display: flex;
        flex-direction: row;
        margin: 0;
        padding: 0;
    }
    li{
        flex-basis: 20%;
        height: 30px;
        background-color: black;
        text-align: center;
        color: white;
        list-style-type: none;
    }
}


@media screen and (min-width: 601px) and (max-width:1024px){
    ol{
        display: flex;
        flex-direction: column;
        margin: 0;
        padding: 0;
    }
    li{
        width: 100%;
        flex-basis: 50px;
        height: 50px;
        border-bottom: 1px solid white;
        background-color: black;
        text-align: center;
        color: white;
        list-style-type: none;
    }
}
    @media screen and (max-width:600px){
    label{
        display: flex;
    }
    nav{
        display: none;
    }
    
}

@media screen and (max-width:600px){
    nav{
        display: none;
    }
}

   label{
 
        display: flex;
        flex-direction: column;
        width: 50px;
        height: 30px;
        justify-content: space-between;
    }
    span{
        flex-basis: 2px;
        background-color: black; 
    }

    input{
        display: none;
    }

    :checked~nav{
        display: block;
    }

</style>
</head>

<body>
<input type="checkbox" id="menu">

<label for="menu">
    <span></span>
    <span></span>
    <span></span>
</label>

<nav>
    <ol>
        <li>Opcion 1</li>
        <li>Opcion 2</li>
        <li>Opcion 3</li>
        <li>Opcion 4</li>
        <li>Opcion 5</li>
    </ol>
</nav>
</body>
</html>
